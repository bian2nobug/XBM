data:
  pyramid_root: /path/to/CPTAC/Pyramid_OUT
  labels_csv: /path/to/cptac_labels_wgd.csv
  clinical_csv: /path/to/cptac_clinical_numeric.csv
  sample_col: SampleID
  label_col: WGD
  split_col: split
  positive_label: WGD-positive
  feature_file: pyramid.pt
  feature_dim: 1536
  max_tiles: 1500
  clin_dim: 41
  clinical_cols: null
  seed: 8766

model:
  class_path: model.XBM:XBMModel
  params:
    split_dims: 1536
    clin_dim: 41
    Cross_num_layers: 2
    Cross_embed_dim: 256
    Cross_num_heads: 2
    Classify_dim: 1
    regression: false
    use_multiscale: true
    trans_perciever: true

training:
  task_type: binary
  output_dir: runs/WGD_XBM_CPTAC_external
  device: cuda:0
  batch_size: 18
  num_workers: 4
  monitor: roc_auc
  seed: 8766
